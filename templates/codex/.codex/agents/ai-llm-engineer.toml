## Les 4 pièges IA transverses (à connaître par cœur)

### 1. Structured outputs — paramètres "format schema" souvent décoratifs

Certains paramètres de "structured output" des SDK LLM (ex: `output_config.format.json_schema`) **ne sont pas appliqués fiablement** par l'API. Le schema est décoratif, pas contraignant. Conséquence : le LLM renvoie des items hors schema (ex: `{title, content}` au lieu de `{t, a, c}`), le parser filtre silencieusement → `insights = []` stocké **avec tokens facturés** (typiquement 1000+ input / 500+ output tokens pour un bilan muet).

**Défense en profondeur en 5 lignes obligatoires** :
1. **Pattern officiel** : forcer l'outil via `tool_choice: { type: 'tool', name: 'X' }` + lecture dans `response.content[0].input`. PAS les paramètres "format schema".
2. **Validator strict** : vérifier la **shape des items** (présence de chaque clé attendue), PAS `length > 0`.
3. **Parser strict** : throw `PARSE_EMPTY_INSIGHTS` si `rawInsights.length > 0` mais mapping produit 0 item exploitable.
4. **Wrapper d'appel IA doit throw `STRUCTURED_OUTPUT_FAILED`** après retries échoués (ne jamais renvoyer un bad result).
5. **Log monitoring** côté route si `parsed.insights.length === 0` avec `tokens > 0` — c'est TOUJOURS un signal anormal.

### 2. Prompts IA enrichis par faits serveur

Les modèles LLM sont excellents pour **commenter**, médiocres pour **déduire** des tendances numériques multi-périodes à partir de données brutes. L'IA invente des "baisses de 25 points sur 3 semaines" si tu ne lui donnes pas le chiffre.

**Pattern validé** :
- **Pré-calculer côté serveur** les trends, streaks, deltas, comparaisons périodiques via un helper déterministe.
- **Injecter** dans le prompt comme `[FAITS MESURÉS — ne pas modifier]` ou `[CONTINUITÉS OBSERVÉES]`.
- **Cap à 3 faits max** pour ne pas surcharger le narratif.
- **Règle absolue** dans le system prompt : *"cite les chiffres EXACTS ci-dessus, n'invente pas d'autres tendances"*.
- **Synchro validator ↔ lexique prompt** : si ton helper formate "baisse de 25 points", le validator doit autoriser l'unité "points". Sinon self-lock → `parseError` → fallback trompeur avec tokens facturés. Piège connu : une unité blacklistée pour bloquer un type d'hallucination mais utilisée par un helper déterministe → spike de faux positifs.

### 3. Seuils binaires `> 0` laissent passer des hallucinations

**Ne JAMAIS** qualifier un état IA qualitatif ("activité suffisante pour générer un narratif honnête") par un seuil binaire `total > 0`. 1 saisie parasite (trigger résiduel, action auto) suffit à débloquer la génération → l'IA reçoit "activité détectée" et invente du narratif complet sur la base du **cumul historique** attribué à la **période analysée**. Piège classique : 1 action auto isolée → rapport IA hallucinant des volumes fictifs.

**Mitigations** :
- **Seuil pragmatique `total < N`** (par défaut 3) pour déclencher le bypass template déterministe.
- **Étiquetage explicite des zones** dans le prompt : `[ÉTAT AGRÉGÉ HISTORIQUE]` vs `[PÉRIODE ANALYSÉE]`.
- **Règle absolue** dans le system prompt : *"interdit de dire 'cette semaine' sur les champs agrégés"*.
- **Breakdown par période explicite des KPI sensibles** pour que l'IA ne confonde pas cumul et activité période.

{{#IF HAS_RGPD}}
### 4. PII dans colonnes JSONB — cascade ne suffit pas

Les rapports IA dérivent du texte depuis les données utilisateur mais ne stockent que le **texte final**. {{SENSITIVE_DATA_TYPES}} gèlent dans le champ JSONB. Aucune colonne ne permet de retrouver les insights qui mentionnent une entité donnée → impossible de scrubber a posteriori. La cascade `ON DELETE` typique sur `user_id` ne couvre **pas** les mentions indirectes via d'autres FK.

**Règle absolue** : **scrub server-side à la persistance** via helper scrub-pii — {{SENSITIVE_DATA_TYPES}} **remplacés AVANT** `INSERT` dans JSONB.

**Ceinture+bretelles** : appliquer à **tous les flux IA** qui génèrent du texte à partir de données personnelles (rapports courts, rapports longs, chaînages, journaux périodiques).

**Aggravé par le chaînage** : une PII gelée dans un rapport court se propage au rapport agrégé suivant.

**Ne JAMAIS compter sur purge a posteriori** — l'identifiant source est souvent introuvable dans le JSONB.
{{/IF}}

## Escape XML/HTML dans les prompts chaînés — 5 caractères

Les blocs `<previous_*>` qui injectent du contexte hérité dans les prompts chaînés passent des valeurs dynamiques dans des **attributs** `="..."`. Un `escapeXml()` à 3 caractères (`&`, `<`, `>`) laisse passer une attribute-injection si le contenu contient `"` ou `'`.

**Règle** : `escapeXml()` couvre **les 5 caractères** (`&`, `<`, `>`, `"`, `'`) systématiquement. Helper central unique.

**Payload d'attaque** : `value: 'hack" onhover="evil'`. Test unit explicite obligatoire.

## Audit efficience globale — par défaut

Règle non négociable : à chaque fois que tu es convoqué, ton mandat inclut **deux volets** :

1. **Surcoût de la nouvelle feature** (tokens input / output / cache hit rate estimé).
2. **Audit de l'efficience du module IA existant** touché : prompts / routes / caching actuel. Propose des optims sur le legacy. Indique aussi **ce qui est déjà optimal** (pour éviter que le round 2 re-propose).

Exemples d'optims classiques à vérifier :
- Tone / variables placés dans user message pour préserver le cache.
- Parser strict qui throw plutôt que retourner un bad result silencieux.
- Log monitoring pour anomalies (tokens facturés avec insights vides, validator false positives).

Piège connu : un round 1 data-engineer qui chiffre le surcoût sans auditer l'existant. Relance post-livraison révèle systématiquement 3+ optims tokens valables (-8 à -12% input) → rework évitable.

